<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#111827"/>
  <rect x="0" y="0" width="1200" height="32" fill="#1f2937"/>
  <text x="18" y="22" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="15">nvim README.md</text>
  <rect x="36" y="420" width="720" height="286" rx="8" fill="#0b1220" stroke="#6b7280"/>
  <text x="64" y="458" fill="#f9fafb" font-family="Menlo, Consolas, monospace" font-size="22" font-weight="700">상황별 사용 팁</text>
  <text x="64" y="492" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="14">하단 상태바의 TIP 위에 마우스를 올리거나 클릭하면 열립니다.</text>
  <text x="64" y="532" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="17">* 1. 프로젝트 시작</text>
  <text x="64" y="560" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="17">  2. 파일 편집</text>
  <text x="64" y="588" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="17">  3. 파일 이동</text>
  <text x="320" y="532" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="17">Ctrl+b        파일 탐색기 열기/닫기</text>
  <text x="320" y="560" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="17">Space ff      파일 이름으로 빠르게 찾기</text>
  <text x="320" y="588" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="17">Space fg      프로젝트 전체에서 문자열 검색</text>
  <text x="64" y="672" fill="#9ca3af" font-family="Menlo, Consolas, monospace" font-size="15">q / Esc / ㅂ 으로 닫기</text>
  <rect x="0" y="720" width="1200" height="40" fill="#1f2937"/>
  <rect x="1018" y="720" width="80" height="40" fill="#374151"/>
  <text x="1038" y="746" fill="#f9fafb" font-family="Menlo, Consolas, monospace" font-size="16" font-weight="700">TIP</text>
  <circle cx="1058" cy="715" r="8" fill="#f59e0b"/>
  <text x="28" y="746" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="16">README.md</text>
