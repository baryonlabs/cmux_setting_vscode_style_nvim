  <text x="370" y="86" fill="#f9fafb" font-family="Menlo, Consolas, monospace" font-size="24" font-weight="700"># Neovim 설정 안내</text>
  <text x="370" y="132" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="17">VSCode를 쓰던 사람이 Neovim에 적응하기 쉽도록 구성한 개인 설정입니다.</text>
  <text x="370" y="188" fill="#93c5fd" font-family="Menlo, Consolas, monospace" font-size="19">## 특히 강조한 점</text>
  <text x="370" y="232" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="16">파일 탐색기    Ctrl+b로 VSCode 사이드바처럼 열고 닫습니다.</text>
  <text x="370" y="264" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="16">마우스 사용    상태바 TIP, 우클릭 메뉴, 팁 창 클릭을 지원합니다.</text>
  <text x="370" y="296" fill="#d1d5db" font-family="Menlo, Consolas, monospace" font-size="16">한글 입력 보정 :ㅂ, :ㅈ, :ㅈㅂ 입력을 보정합니다.</text>

